events {}

http {
    client_max_body_size 20M;
    proxy_buffering off;
    proxy_request_buffering off;

    upstream frontend_upstream {
        server frontend:3000;
    }

    upstream api_gateway_upstream {
        server api-gateway:8080;
    }

    server {
        listen 80;
        server_name stolyarniy-dvor.shop;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name stolyarniy-dvor.shop;

        ssl_certificate /etc/letsencrypt/live/stolyarniy-dvor.shop-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/stolyarniy-dvor.shop-0001/privkey.pem;

        location /api/ {
            proxy_pass http://api_gateway_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api {
            proxy_pass http://api_gateway_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}